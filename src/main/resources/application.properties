
spring.application.name=SkillMentorAPI

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none

# HikariCP Connection Pool - Optimized for Supabase Session Mode
# Session mode supports limited concurrent connections.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
logging.level.org.flywaydb=DEBUG

# Show SQL queries in console (for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============ SECURITY CONFIGURATION ============
# For local development with HMAC, set CLERK_JWT_SECRET
# For standard Clerk usage, set CLERK_JWKS_URL and CLERK_PEM
app.jwt.secret=${CLERK_JWT_SECRET:}
app.clerk.pem=${CLERK_PEM:}
app.clerk.jwks-url=${CLERK_JWKS_URL:https://square-insect-70.clerk.accounts.dev/.well-known/jwks.json}

# ============ SERVER CONFIGURATION ============
server.port=8080

# ============ LOGGING ============
logging.level.root=INFO
logging.level.com.skillmentor=DEBUG

# Third-party libraries (less verbose)
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=DEBUG

# Log file configuration
logging.file.name=logs/skillmentor.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10

# ============ SUPABASE STORAGE ============
# Format: https://[project-id].supabase.co/storage/v1
supabase.url=${SUPABASE_URL:}
supabase.key=${SUPABASE_KEY:}
supabase.bucket=${SUPABASE_BUCKET:skillmentor-images}

# ============ UPLOAD SIZE LIMITS ============
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
